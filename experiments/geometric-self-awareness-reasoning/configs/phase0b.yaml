# Phase 0B: Trace Generation Configuration
# Qwen2.5-7B-Instruct on GSM8K training split

model:
  name: "Qwen/Qwen2.5-7B-Instruct"
  torch_dtype: "bfloat16"
  device_map: "auto"

dataset:
  name: "gsm8k"
  split: "train"
  config: "main"
  n_problems: 1000
  shuffle: false        # deterministic ordering; set seed below if true
  seed: 42

generation:
  temperature: 0.7
  top_p: 0.95
  max_new_tokens: 512
  do_sample: true
  repetition_penalty: 1.0

prompt_template: |
  Solve the following math problem step by step. Show all your work clearly.
  End your response with "Final answer: [number]" on its own line.

  Problem: {question}

output:
  jsonl_path: "data/traces_gsm8k_qwen.jsonl"
  report_path: "outputs/phase0b_report.txt"
  checkpoint_every: 100   # write checkpoint file every N examples
